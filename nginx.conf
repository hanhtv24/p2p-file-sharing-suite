server {
    listen 80;
    server_name p2p.combokit.net p2p.ptit.asia;

    # Cho phép upload file lớn (mặc định Nginx chỉ cho 1MB, vượt quá sẽ trả về
    # trang lỗi HTML 413 khiến FE parse JSON bị lỗi "Unexpected token '<'").
    # Phải khớp (hoặc lớn hơn) MAX_UPLOAD_BYTES trong web/api.js.
    client_max_body_size 2048M;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}